name: Deploy a producción (EC2)

# Despliegue manual: GitHub UI (Run workflow), `gh workflow run deploy.yml`
# o `make deploy [SERVICES=...] [TAG=...]`.
#
# Secrets requeridos:
#   DOCKERHUB_USERNAME  usuario de Docker Hub
#   DOCKERHUB_TOKEN     access token de Docker Hub (no la contraseña)
#   EC2_HOST            host de la instancia (ej. ec2-X-X-X-X.compute-1.amazonaws.com)
#   EC2_USER            usuario SSH (ubuntu)
#   EC2_SSH_KEY         clave privada ed25519 dedicada al deploy
#   AUTH_KEYSTORE_B64   keystore.jks de sgivu-auth en base64 (está gitignorado)

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Servicios a reiniciar en EC2 (separados por coma) o 'all'"
        required: false
        default: all
      tag:
        description: "Tag de imagen existente a desplegar (omite el build = rollback)"
        required: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolver tag y servicios
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      skip_build: ${{ steps.compute.outputs.skip_build }}
      services: ${{ steps.compute.outputs.services }}
    steps:
      - id: compute
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi
          INPUT_SERVICES="${{ github.event.inputs.services }}"
          if [ -z "$INPUT_SERVICES" ] || [ "$INPUT_SERVICES" = "all" ]; then
            echo "services=" >> "$GITHUB_OUTPUT"
          else
            echo "services=$(echo "$INPUT_SERVICES" | tr ',' ' ')" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: Imagen · ${{ matrix.service }}
    needs: resolve
    if: needs.resolve.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: sgivu-auth, dir: apps/backend/sgivu-auth }
          - { service: sgivu-client, dir: apps/backend/sgivu-client }
          - { service: sgivu-config, dir: apps/backend/sgivu-config }
          - { service: sgivu-discovery, dir: apps/backend/sgivu-discovery }
          - { service: sgivu-gateway, dir: apps/backend/sgivu-gateway }
          - { service: sgivu-user, dir: apps/backend/sgivu-user }
          - { service: sgivu-vehicle, dir: apps/backend/sgivu-vehicle }
          - { service: sgivu-purchase-sale, dir: apps/backend/sgivu-purchase-sale }
          - { service: sgivu-ml, dir: apps/ml/sgivu-ml }
    steps:
      - uses: actions/checkout@v4

      # keystore.jks está gitignorado (clave de firma JWT): el jar de sgivu-auth
      # lo necesita en el classpath, así que se restaura desde el secret.
      - name: Restaurar keystore de sgivu-auth
        if: matrix.service == 'sgivu-auth'
        run: |
          if [ -z "${{ secrets.AUTH_KEYSTORE_B64 }}" ]; then
            echo "::error::Falta el secret AUTH_KEYSTORE_B64 (base64 de keystore.jks)"
            exit 1
          fi
          echo "${{ secrets.AUTH_KEYSTORE_B64 }}" | base64 -d \
            > apps/backend/sgivu-auth/src/main/resources/keystore.jks

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.dir }}
          push: true
          tags: |
            stevenrq/${{ matrix.service }}:${{ needs.resolve.outputs.tag }}
            stevenrq/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  deploy:
    name: Desplegar en EC2
    needs: [resolve, build-push]
    if: always() && needs.resolve.result == 'success' && (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
      SERVICES: ${{ needs.resolve.outputs.services }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Sincronizar assets de compose
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.env*' \
            --exclude '*.pem' \
            --exclude '.host-run' \
            infra/compose/sgivu-docker-compose/docker-compose.yml \
            infra/compose/sgivu-docker-compose/postgres-init \
            infra/compose/sgivu-docker-compose/scripts/run-service.sh \
            infra/compose/sgivu-docker-compose/scripts/rebuild-service.sh \
            infra/compose/sgivu-docker-compose/scripts/dbs-backups.sh \
            "$EC2_USER@$EC2_HOST:/home/ubuntu/sgivu-docker-compose/"

      - name: Actualizar TAG y recrear contenedores
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" "
            set -euo pipefail
            cd /home/ubuntu/sgivu-docker-compose
            grep -q '^TAG=' .env && sed -i 's/^TAG=.*/TAG=${TAG}/' .env || echo 'TAG=${TAG}' >> .env
            docker compose pull -q ${SERVICES}
            if [ -n '${SERVICES}' ]; then
              docker compose up -d --no-deps ${SERVICES}
            else
              docker compose up -d
            fi
            docker image prune -f >/dev/null
            docker compose ps
          "

      - name: Smoke check (gateway health)
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" "
            for i in \$(seq 1 18); do
              if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
                echo 'Gateway saludable.'
                exit 0
              fi
              sleep 5
            done
            echo 'El gateway no respondió al health check en 90s'
            exit 1
          "
